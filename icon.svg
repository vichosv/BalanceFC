<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#080c10"/>
  <!-- Glow -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.15"/>
  <!-- Soccer ball hexagon pattern -->
  <circle cx="256" cy="230" r="88" fill="#0e1318" stroke="#00e5ff" stroke-width="3" opacity="0.9"/>
  <!-- Ball lines simplified -->
  <line x1="256" y1="142" x2="256" y2="318" stroke="#00e5ff" stroke-width="2" opacity="0.35"/>
  <line x1="168" y1="186" x2="344" y2="274" stroke="#00e5ff" stroke-width="2" opacity="0.35"/>
  <line x1="168" y1="274" x2="344" y2="186" stroke="#00e5ff" stroke-width="2" opacity="0.35"/>
  <circle cx="256" cy="230" r="88" fill="none" stroke="#00e5ff" stroke-width="3"/>
  <!-- BFC text -->
  <text x="256" y="245" text-anchor="middle" dominant-baseline="middle"
    font-family="'Barlow Condensed', Arial Black, sans-serif"
    font-weight="900" font-size="72" fill="#00e5ff" letter-spacing="2">BFC</text>
  <!-- Tagline -->
  <text x="256" y="380" text-anchor="middle"
    font-family="Arial, sans-serif" font-weight="700" font-size="28"
    fill="#6f8492" letter-spacing="6">BALANCE FC</text>
</svg>
